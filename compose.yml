# ─── Docker Compose ─────────────────────────────────────────────
# Start everything:
#   docker compose up --build
#
# Services:
#   db       → PostgreSQL  (port 5434 on host)
#   backend  → Rust/Actix  (port 7000 on host)
#   frontend → Vue (nginx)  (port 5173 on host)

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bunker
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bunker"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── Backend (Rust + Actix-web) ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "7000:7000"
    environment:
      PORT: "7000"
      STORAGE_PATH: "/app/uploads"
      DATABASE__HOST: db
      DATABASE__PORT: "5432"
      DATABASE__USERNAME: postgres
      DATABASE__PASSWORD: password
      DATABASE__DATABASE_NAME: bunker
      RUST_LOG: info
    volumes:
      - uploads:/app/uploads

  # ── Frontend (Vite dev server with HMR) ──────────────────────
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  uploads:
