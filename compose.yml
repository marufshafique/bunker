# Services:
#   db       → PostgreSQL  (internal only — not published to host)
#   backend  → Rust/Actix  (port 6010 on host)
#   frontend → Vue (nginx)  (port 5173 on host)

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bunker
    volumes:
      - ${HOME}/Bunker/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bunker"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "6010:6010"
    environment:
      PORT: "6010"
      STORAGE_PATH: "/app/uploads"
      DATABASE__HOST: db
      DATABASE__PORT: "5432"
      DATABASE__USERNAME: postgres
      DATABASE__PASSWORD: password
      DATABASE__DATABASE_NAME: bunker
      RUST_LOG: info
    volumes:
      - ${HOME}/Bunker:/app/uploads

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:6010}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "6011:80"

volumes:
  pgdata:
  uploads:
